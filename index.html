<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Madhyamik Result 2026</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
    }
    header {
      background: #002b5b;
      color: white;
      padding: 15px;
      text-align: center;
    }
    .container {
      max-width: 500px;
      margin: 40px auto;
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    .result {
      margin-top: 20px;
      display: none;
      border-top: 1px solid #ddd;
      padding-top: 15px;
    }
    .result p {
      margin: 5px 0;
    }
    footer {
      text-align: center;
      padding: 10px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>

<header>
  <h1>Madhyamik Examination Results 2026</h1>
</header>

<div class="container">
  <h2>Check Your Result</h2>
  <input type="text" id="roll" placeholder="Enter Roll Number">
  <input type="text" id="dob" placeholder="Enter Date of Birth (DD/MM/YYYY)">
  <button onclick="showResult()">Get Result</button>

  <div class="result" id="resultBox">
    <h3>Result</h3>
    <p><strong>Name:</strong> Sumit Barik</p>
    <p><strong>Roll:</strong> <span id="rRoll"></span></p>
    <p><strong>Total Marks:</strong> 374</p>
    <p><strong>Percentage:</strong> 57%</p>
    <p><strong>Status:</strong> pass</p>
<br>
     <center><h3><p style="color: red;"> Poor Result For Science Streams</h3> </p></center>
<br>
    <center> <a href = "April Fool.html">Click Here to More Details</a></center>
  </div>
</div>

<footer>
  &copy; 2026 West Bengal Board of Secondary Education (Demo Site)
</footer>

<script>
function showResult() {
  let roll = document.getElementById("roll").value;
  let dob = document.getElementById("dob").value;

  if(roll === "" || dob === "") {
    alert("Please enter all details");
    return;
  }

  document.getElementById("rRoll").innerText = roll;
  document.getElementById("resultBox").style.display = "block";
}
</script>

</body>
</html>
